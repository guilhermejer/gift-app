        $ref: '#/definitions/domain.Profile'
      userID:
        type: string
      userRelation:
        type: string
    type: object
  domain.Gender:
    enum:
    - male
    - female
    - other
    type: string
    x-enum-varnames:
    - GenderMale
    - GenderFemale
    - GenderOther
  domain.Gift:
    properties:
      description:
        type: string
      friendID:
        type: string
      giftID:
        type: string
      occasionDetails:
        type: string
      priceRange:
        type: string
      reminderID:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  domain.Profile:
    properties:
      dislikes:
        items:
          type: string
        type: array
      embedding:
        items:
          type: number
        type: array
      friendID:
        type: string
      likes:
        items:
          type: string
        type: array
    type: object
  domain.Reminder:
    properties:
      friendID:
        type: string
      message:
        type: string
      reminderID:
        type: string
      triggerAt:
        type: string
      type:
        $ref: '#/definitions/domain.ReminderType'
      userID:
        type: string
    type: object
  domain.ReminderType:
    enum:
    - birthday
    - custom
    type: string
    x-enum-varnames:
    - ReminderTypeBirthday
    - ReminderTypeCustom
  domain.User:
    properties:
      active:
        type: boolean
      birthDate:
        type: string
      city:
        type: string
      email:
        type: string
      fullName:
        type: string
      planID:
        type: string
      userID:
        type: string
    type: object
  http.AgentChatRequest:
    properties:
      friend_id:
        type: string
      message:
        type: string
    type: object
  http.AgentFinalizeRequest:
    properties:
      friend_id:
        type: string
    type: object
  http.FriendUpsertRequest:
    properties:
      birthDate:
        type: string
      city:
        type: string
      gender:
        type: string
      name:
        type: string
      userRelation:
        type: string
    type: object
  http.GiftUpsertRequest:
    properties:
      description:
        type: string
      friendID:
        type: string
      occasionDetails:
        type: string
      priceRange:
        type: string
      reminderID:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  http.ProfileUpsertRequest:
    properties:
      dislikes:
        items:
          type: string
        type: array
      embedding:
        items:
          type: number
        type: array
      friend_id:
        type: string
      likes:
        items:
          type: string
        type: array
    type: object
  http.ReminderUpsertRequest:
    properties:
      friendID:
        type: string
      message:
        type: string
      triggerAt:
        type: string
      type:
        $ref: '#/definitions/domain.ReminderType'
      userID:
        type: string
    type: object
  http.SuggestionChatRequest:
    properties:
      gift_id:
        type: string
      message:
        type: string
    type: object
  http.SuggestionCreateRequest:
    properties:
      occasion_details:
        type: string
      reminder_id:
        type: string
    type: object
  http.SuggestionFinalizeRequest:
    properties:
      gift_id:
        type: string
    type: object
  http.UserUpsertRequest:
    properties:
      active:
        type: boolean
      birthDate:
        type: string
      city:
        type: string
      email:
        type: string
      fullName:
        type: string
      planId:
        type: string
    type: object

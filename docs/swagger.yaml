      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Reminder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar lembrete
      tags:
      - reminders
swagger: "2.0"

basePath: /
definitions:
  domain.Friend:
    properties:
      birthDate:
        type: string
      city:
        type: string
      friendID:
        type: string
      gender:
        $ref: '#/definitions/domain.Gender'
      name:
        type: string
      profile:
        $ref: '#/definitions/domain.Profile'
      userID:
        type: string
      userRelation:
        type: string
    type: object
  domain.Gender:
    enum:
    - male
    - female
    - other
    type: string
    x-enum-varnames:
    - GenderMale
    - GenderFemale
    - GenderOther
  domain.Gift:
    properties:
      description:
        type: string
      friendID:
        type: string
      giftID:
        type: string
      priceRange:
        type: string
      tags:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  domain.Profile:
    properties:
      dislikes:
        items:
          type: string
        type: array
      friendID:
        type: string
      likes:
        items:
          type: string
        type: array
    type: object
  domain.Reminder:
    properties:
      friendID:
        type: string
      message:
        type: string
      reminderID:
        type: string
      triggerAt:
        type: string
      type:
        $ref: '#/definitions/domain.ReminderType'
      userID:
        type: string
    type: object
  domain.ReminderType:
    enum:
    - birthday
    - custom
    type: string
    x-enum-varnames:
    - ReminderTypeBirthday
    - ReminderTypeCustom
  domain.User:
    properties:
      active:
        type: boolean
      birthDate:
        type: string
      city:
        type: string
      planID:
        type: string
      userID:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API para sugestões de presentes personalizadas.
  title: Gift App API
  version: "1.0"
paths:
  /friends/{friend_id}:
    get:
      parameters:
      - description: ID do amigo
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Friend'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Buscar amigo
      tags:
      - friends
  /friends/{friend_id}/gifts:
    get:
      parameters:
      - description: ID do amigo
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Gift'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar sugestões de presente
      tags:
      - gifts
    post:
      consumes:
      - application/json
      parameters:
      - description: ID do amigo
        in: path
        name: friend_id
        required: true
        type: string
      - description: Dados do presente
        in: body
        name: gift
        required: true
        schema:
          $ref: '#/definitions/domain.Gift'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Gift'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar sugestão de presente
      tags:
      - gifts
  /friends/{friend_id}/profile:
    get:
      parameters:
      - description: ID do amigo
        in: path
        name: friend_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Profile'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Buscar perfil do amigo
      tags:
      - profiles
    put:
      consumes:
      - application/json
      parameters:
      - description: ID do amigo
        in: path
        name: friend_id
        required: true
        type: string
      - description: Dados do perfil
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/domain.Profile'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Profile'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar ou atualizar perfil do amigo
      tags:
      - profiles
  /users:
    post:
      consumes:
      - application/json
      parameters:
      - description: Dados do usuário
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar usuário
      tags:
      - users
  /users/{user_id}:
    get:
      parameters:
      - description: ID do usuário
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.User'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Buscar usuário
      tags:
      - users
  /users/{user_id}/friends:
    get:
      parameters:
      - description: ID do usuário
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Friend'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar amigos do usuário
      tags:
      - friends
    post:
      consumes:
      - application/json
      parameters:
      - description: ID do usuário
        in: path
        name: user_id
        required: true
        type: string
      - description: Dados do amigo
        in: body
        name: friend
        required: true
        schema:
          $ref: '#/definitions/domain.Friend'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Friend'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Criar amigo
      tags:
      - friends
  /users/{user_id}/reminders:
    get:
      parameters:
      - description: ID do usuário
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Reminder'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Listar lembretes do usuário
      tags:
      - reminders
    post:
      consumes:
      - application/json
      parameters:
      - description: ID do usuário
        in: path
        name: user_id
        required: true
        type: string
      - description: Dados do lembrete
        in: body
        name: reminder
        required: true
        schema:
          $ref: '#/definitions/domain.Reminder'
